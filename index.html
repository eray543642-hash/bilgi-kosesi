<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Sitesi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --accent: #e8c97e;
      --text: #f0ede8;
      --muted: #6b6860;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(232,201,126,0.2);
      border-radius: 8px;
      padding: 3.5rem 4rem;
      max-width: 620px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 60px rgba(232,201,126,0.07);
      animation: fadeUp 1s 0.4s both;
    }

    .card::before {
      content: '✦';
      display: block;
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 1.5rem;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 1.2rem;
      line-height: 1.3;
    }

    h1 em { font-style: italic; color: var(--accent); }

    .divider {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 1.5rem auto;
      border-radius: 2px;
    }

    p { font-size: 1.05rem; color: var(--muted); line-height: 1.8; }
    p strong { color: var(--text); }

    /* İLERLEME KUTUSU */
    .progress-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 2rem 2.5rem;
      max-width: 500px;
      width: 90%;
      text-align: center;
      animation: fadeUp 1s 0.6s both;
    }

    .progress-bar-bg {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-bar-fill {
      height: 100%;
      width: 75%;
      border-radius: 99px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399, #fbbf24, #f87171);
      transition: width 0.8s ease;
    }

    .progress-label {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .progress-sub {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hepinize <em>Merhaba!</em></h1>
    <div class="divider"></div>
    <p>
       <strong></strong> Bu web sitesini
      <strong>faydalı bilgiler</strong> yayınlamak için oluşturdum.
      <br><br>
      Umarım hepinize faydalı olur. 🌟
    </p>
  </div>

  <div class="progress-box">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="progress-label">Geliştirme İlerlemesi: <span id="progressText">%0.05</span></div>
    <div class="progress-sub">Bu sayfa çok yakında kullanıma açılacak! 🚀</div>
  </div>

</body>
</html>
